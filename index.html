<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Siswa Modern</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* 🌌 BACKGROUND BARU */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,
        #2b1055,
        #4b0082,
        #1a002b);
}

/* 🌟 WRAPPER */
.container{
    width:350px;
    background:#ffffff10;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(138,43,226,0.4);
    backdrop-filter:blur(10px);
}

/* HEADER BANNER */
.banner{
    height:120px;
    background:linear-gradient(45deg,#8a2be2,#c77dff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
    letter-spacing:2px;
}

/* PROFILE IMAGE FLOAT */
.profile{
    display:flex;
    justify-content:center;
    margin-top:-50px;
}

.profile img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
    background:white;
}

/* CONTENT */
.content{
    padding:20px;
    text-align:center;
    color:white;
}

.content h2{
    margin-top:10px;
    font-size:22px;
}

.content p{
    font-size:13px;
    opacity:0.9;
    margin-top:5px;
}

/* INFO BOX */
.info{
    margin-top:15px;
    text-align:left;
    font-size:13px;
    line-height:1.6;
}

.info b{
    color:#d9b3ff;
}

/* SOCIAL */
.social{
    margin-top:15px;
    text-align:center;
}

.social a{
    color:white;
    margin:0 8px;
    font-size:20px;
    transition:0.3s;
}

.social a:hover{
    color:#c77dff;
    transform:scale(1.2);
}
</style>

</head>

<body>

<div class="container">

    <!-- BANNER -->
    <div class="banner">
        PROFIL DIRI SISWA
    </div>

    <!-- FOTO -->
    <div class="profile">
        <img src="foto.jpg" alt="Foto Profil">
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h2>Inayah Putri Mayu</h2>
        <p>Pelajar • Kreatif • Informatika</p>

        <div class="info">
            <p><b>Kelas:</b> X-A Farmasi</p>
            <p><b>Sekolah:</b> SMKS Kesehatan Yannas Husada Bangkalan</p>
            <p><b>Hobi:</b> Coding & Desain</p>
        </div>

        <!-- SOCIAL -->
        <div class="social">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>

    </div>

</div>

</body>
</html>
